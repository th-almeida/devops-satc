name: Docker Image Check

on:
  push:
    branches:
      - development
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: satc-devops
  IMAGE_TAG: "0.0.2"

jobs:
  docker_check:
    runs-on: ubuntu-latest
    env:
      SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
      SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
    permissions:
      contents: read
      actions: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@e44258b109568baa0df60ed515909fc6c72cba92 # v2
        with:
          args: >
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
            -Dsonar.host.url=https://sonarcloud.io
            -Dsonar.sources=.
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Login into Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Secrets só em env; o script usa variáveis de ambiente (evita expansão direta de secrets no run)
      - name: Build the Docker image
        run: docker build -t "${DOCKER_USERNAME}/${IMAGE_NAME}:${IMAGE_TAG}" .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@f9424c10c36e288d5fa79bd3dfd1aeb2d6eae808 # v0.33.0
        with:
          scan-type: "image"
          image-ref: docker.io/${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: json
          output: trivy-results.json
          severity: MEDIUM,HIGH,CRITICAL

      - name: Upload Trivy results as artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: trivy-results.json
          path: trivy-results.json

      - name: Analyze Trivy results
        env:
          TRIVY_MEDIUM_MAX: 50
        run: |
          if [ -f trivy-results.json ]; then
            VULN_COUNT=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "MEDIUM")] | length' trivy-results.json)
            echo "Quantidade de vulnerabilidades médias: $VULN_COUNT (limite para bloquear: ${TRIVY_MEDIUM_MAX})"

            if [ "$VULN_COUNT" -ge "$TRIVY_MEDIUM_MAX" ]; then
              echo "Pipeline bloqueada: ${TRIVY_MEDIUM_MAX} ou mais vulnerabilidades médias encontradas."
              exit 1
            fi
          else
            echo "Arquivo de resultados do Trivy não encontrado."
            exit 1
          fi

      - name: Falhar se houver mais de 40 issues MAJOR no SonarCloud
        run: |
          COUNT=$(curl -s -u "${SONAR_TOKEN}:" \
            "https://sonarcloud.io/api/issues/search?componentKeys=${SONAR_PROJECT_KEY}&types=VULNERABILITY&severities=MAJOR&resolved=false&ps=1" \
            | jq '.total')

          echo "Quantidade de issues de vulnerabilidade MAJOR no Sonar: $COUNT"

          if [ "$COUNT" -gt 40 ]; then
            echo "Pipeline bloqueada: mais de 40 issues MAJOR encontradas (Sonar)."
            exit 1
          fi
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
